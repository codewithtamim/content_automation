services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file: .env
    environment:
      PYTHONUNBUFFERED: 1
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: tiktok_automation
      POSTGRES_USER: tiktok
      POSTGRES_PASSWORD: tiktok_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tiktok -d tiktok_automation"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
